            - list [ref=e56]:
              - listitem [ref=e57]: Use licensed electricians for any grid-tied or high-voltage work.
              - listitem [ref=e58]: Wear PPE, de-energize circuits, and follow lock-out/tag-out where relevant.
              - listitem [ref=e59]: Document shade surveys, torque checks, and maintenance schedules.
              - listitem [ref=e60]: Match equipment to manufacturer specs; check voltage/current limits.
              - listitem [ref=e61]: Ensure safe ladders, harnesses, and rooftop practices.
        - article [ref=e62]:
          - generic [ref=e63]:
            - heading "Do not" [level=2] [ref=e64]
            - list [ref=e65]:
              - listitem [ref=e66]: Perform electrical work you're not qualified for.
              - listitem [ref=e67]: Bypass safety devices or ignore manufacturer warnings.
              - listitem [ref=e68]: Work at height without proper anchors or supervision.
              - listitem [ref=e69]: Share unvetted advice as professional guidance.
